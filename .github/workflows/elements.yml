name: "@flouviahq/elements"

on:
  push:
    branches: [main]
    paths:
      - "packages/elements/**"
  pull_request:
    paths:
      - "packages/elements/**"

defaults:
  run:
    working-directory: packages/elements

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/elements/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Build (tsc --emitDeclarationOnly + esbuild)
        run: npm run build

      - name: Anti-deriva de exports públicos
        run: npm run check-exports

      - name: Are the Types Wrong?
        run: npx attw --pack .

      - name: publint
        run: npx publint
